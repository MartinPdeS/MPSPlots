name: Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  Ubuntu_x86_64:
    uses: MartinPdeS/MPSPlots/.github/workflows/ubuntu_x86_64.yml@main
    secrets: inherit
    with:
      publish_wheel: true
      python_wheel: "[['3.10', 'cp310']]"
      python_twine: '3.8'
      upload_documentation: false
      python_documentation: "3.10" #no documentation for python 3.7 (pickle5 not present˘)
      update_coverage: 'true'


  job_publish_wheel:
    needs: [Ubuntu_x86_64]
    name: "Publish wheel to PyPi"
    runs-on: ubuntu-latest
    steps:

      - name: "Set-up: Python ${{ inputs.python_twine }}"
        uses: actions/setup-python@v4
        with:
          python-version: "${{ inputs.python_twine }}"

      - name: "Install: Dependencies"
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine

      - name: "Download: wheel"
        uses: actions/download-artifact@v3
        with:
          path: dist

      - name: "Publish: Wheel"
        uses: pypa/gh-action-pypi-publish@v1.5.1
        with:
          packages_dir: dist/*/
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}